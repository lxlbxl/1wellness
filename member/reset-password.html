<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | 1wellness</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/images/brand/favicon-32.png">
    <link rel="shortcut icon" href="/images/brand/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    sage: { 50:'#F2F4F1', 100:'#E3E8E1', 500:'#2C3E35', 600:'#1A2620' },
                    coral: { 400:'#D97757' }
                },
                fontFamily: { serif:['"Playfair Display"','serif'], sans:['"Inter"','sans-serif'] }
            }}
        }
    </script>
    <style>body{background:#FDFCF8;font-family:"Inter",sans-serif;}</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <img src="/images/brand/logo-icon-sm.png" alt="1wellness" class="w-12 h-12 object-contain mx-auto mb-4">
            <h1 class="font-serif text-3xl text-sage-600">Reset Password</h1>
        </div>

        <!-- Validating state -->
        <div id="validating" class="text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-sage-500 mx-auto mb-4"></div>
            <p class="text-sage-400">Validating your link…</p>
        </div>

        <!-- Invalid state -->
        <div id="invalid" class="hidden bg-red-50 border border-red-200 rounded-3xl p-8 text-center">
            <p id="invalidMsg" class="text-red-600 font-medium mb-4"></p>
            <a href="login.html" class="text-sage-500 hover:underline text-sm">Back to login</a> &nbsp;·&nbsp;
            <button onclick="document.getElementById('forgotSection').classList.remove('hidden');document.getElementById('invalid').classList.add('hidden')"
                class="text-sage-500 hover:underline text-sm">Request a new link</button>
        </div>

        <!-- Reset form -->
        <div id="resetForm" class="hidden bg-white border border-sage-100 rounded-3xl p-8 shadow-sm">
            <p class="text-sage-400 text-sm mb-6">Setting new password for <span id="emailHint" class="font-medium text-sage-600"></span></p>
            <form onsubmit="submitReset(event)" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-sage-300 uppercase tracking-widest mb-2">New Password</label>
                    <input type="password" id="newPassword" minlength="8" required placeholder="Min. 8 characters"
                        class="w-full px-5 py-4 bg-sage-50 border border-sage-100 rounded-2xl text-sage-600 focus:outline-none focus:border-sage-500 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-sage-300 uppercase tracking-widest mb-2">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Repeat password"
                        class="w-full px-5 py-4 bg-sage-50 border border-sage-100 rounded-2xl text-sage-600 focus:outline-none focus:border-sage-500 transition-all">
                </div>
                <div id="formMsg" class="hidden text-sm text-center py-2 rounded-xl"></div>
                <button type="submit" id="submitBtn"
                    class="w-full py-4 bg-sage-500 text-white font-bold rounded-2xl hover:shadow-xl hover:shadow-sage-500/20 transition-all">
                    Update Password
                </button>
            </form>
        </div>

        <!-- Success state -->
        <div id="success" class="hidden bg-white border border-sage-100 rounded-3xl p-8 shadow-sm text-center">
            <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 class="font-serif text-2xl text-sage-600 mb-2">Password Updated</h2>
            <p class="text-sage-400 mb-6">You can now log in with your new password.</p>
            <a href="login.html" class="inline-block px-8 py-3 bg-sage-500 text-white rounded-2xl font-bold hover:shadow-lg transition-all">Go to Login</a>
        </div>

        <!-- Forgot / re-request -->
        <div id="forgotSection" class="hidden bg-white border border-sage-100 rounded-3xl p-8 shadow-sm mt-6">
            <h3 class="font-serif text-xl text-sage-600 mb-4">Request a New Link</h3>
            <form onsubmit="submitForgot(event)" class="space-y-4">
                <input type="email" id="forgotEmail" required placeholder="Your account email"
                    class="w-full px-5 py-4 bg-sage-50 border border-sage-100 rounded-2xl text-sage-600 focus:outline-none focus:border-sage-500 transition-all">
                <div id="forgotMsg" class="hidden text-sm text-center py-2 rounded-xl"></div>
                <button type="submit" class="w-full py-4 bg-sage-500 text-white font-bold rounded-2xl hover:shadow-xl transition-all">Send Reset Link</button>
            </form>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(location.search).get('token');

        async function validate() {
            if (!token) {
                show('invalid');
                document.getElementById('invalidMsg').textContent = 'No reset token found. Please use the link from your email.';
                return;
            }
            try {
                const res  = await fetch('/backend/api/reset-password.php?token=' + encodeURIComponent(token));
                const data = await res.json();
                if (data.valid) {
                    document.getElementById('emailHint').textContent = data.email_hint;
                    show('resetForm');
                } else {
                    document.getElementById('invalidMsg').textContent = data.error || 'Invalid link.';
                    show('invalid');
                }
            } catch (e) {
                document.getElementById('invalidMsg').textContent = 'Network error. Please try again.';
                show('invalid');
            }
        }

        async function submitReset(e) {
            e.preventDefault();
            const pw1 = document.getElementById('newPassword').value;
            const pw2 = document.getElementById('confirmPassword').value;
            if (pw1 !== pw2) { setMsg('formMsg', 'Passwords do not match.', 'error'); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Updating…';
            try {
                const fd = new FormData();
                fd.append('token', token); fd.append('password', pw1);
                const res  = await fetch('/backend/api/reset-password.php', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) { show('success'); }
                else { setMsg('formMsg', data.error || 'Failed.', 'error'); btn.disabled = false; btn.textContent = 'Update Password'; }
            } catch (e) { setMsg('formMsg', 'Network error.', 'error'); btn.disabled = false; btn.textContent = 'Update Password'; }
        }

        async function submitForgot(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            try {
                const fd = new FormData(); fd.append('email', email);
                const res  = await fetch('/backend/api/forgot-password.php', { method: 'POST', body: fd });
                const data = await res.json();
                setMsg('forgotMsg', data.message || 'Sent!', 'success');
            } catch (e) { setMsg('forgotMsg', 'Network error.', 'error'); }
        }

        function show(id) {
            ['validating','invalid','resetForm','success'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function setMsg(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'text-sm text-center py-2 rounded-xl ' + (type === 'success' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700');
            el.classList.remove('hidden');
        }

        validate();
    </script>
</body>
</html>
